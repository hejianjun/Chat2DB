# 提示词模板配置
# 用于 AI 生成 SQL、解释、优化等场景

prompts:
  # 自然语言转 SQL
  nl_2_sql:
    name: "nl_2_sql"
    description: "将自然语言转换成SQL查询"
    template: |
      ### 请根据以下 table properties 和 SQL input{description}. {ext}
      #
      ### {db_type} SQL tables, with their properties:
      #
      # {schema}
      #
      #
      ### SQL input: {message}

  # SQL 解释
  sql_explain:
    name: "sql_explain"
    description: "解释SQL"
    template: |
      ### 请根据以下 table properties 和 SQL input{description}. {ext}
      #
      ### {db_type} SQL tables, with their properties:
      #
      # {schema}
      #
      #
      ### SQL input: {message}

  # SQL 优化
  sql_optimizer:
    name: "sql_optimizer"
    description: "提供优化建议"
    template: |
      ### 请根据以下 table properties 和 SQL input{description}. {ext}
      #
      ### {db_type} SQL tables, with their properties:
      #
      # {schema}
      #
      #
      ### SQL input: {message}

  # SQL 转换
  sql_2_sql:
    name: "sql_2_sql"
    description: "进行SQL转换"
    template: |
      ### 请根据以下 table properties 和 SQL input{description}. {ext}
      #
      ### {db_type} SQL tables, with their properties:
      #
      # {schema}
      #
      #
      ### SQL input: {message}
      #
      ### 目标 SQL 类型：{target_sql_type}

  # 表选择
  select_tables:
    name: "select_tables"
    description: "选择需要查询的表"
    template: |
      ### 请根据以下 table properties 和 SQL input{description}. {ext}
      #
      ### {db_type} SQL tables, with their properties:
      #
      # {schema}
      #
      #
      ### SQL input: {message}
      
      请只输出 JSON，格式：{"table_names":["表名 1","表名 2"]}，不要输出其他文字。

  # 文本生成
  text_generation:
    name: "text_generation"
    description: "文本生成"
    template: "{message}"

  # 标题生成
  title_generation:
    name: "title_generation"
    description: "生成标题"
    template: "{message}"

  # 自然语言转注释
  nl_2_comment:
    name: "nl_2_comment"
    description: "猜测表和字段注释"
    template: |
      ### 请根据以下 table properties 和 SQL input{description}. {ext}
      #
      ### {db_type} SQL tables, with their properties:
      #
      # {schema}
      #
      #
      ### SQL input: {message}