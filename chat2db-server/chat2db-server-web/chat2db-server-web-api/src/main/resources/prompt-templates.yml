# 提示词模板配置
# 用于 AI 生成 SQL、解释、优化等场景

prompts:
  # 自然语言转 SQL
  nl_2_sql:
    name: "nl_2_sql"
    description: "将自然语言转换成SQL查询"
    template: |
      ### 请根据以下 table properties 和 SQL input{description}. {ext}
      #
      ### {db_type} SQL tables, with their properties:
      #
      # {schema}
      #
      #
      ### SQL input: {message}

  # SQL 解释
  sql_explain:
    name: "sql_explain"
    description: "解释SQL"
    template: |
      ### 请根据以下 table properties 和 SQL input{description}. {ext}
      #
      ### {db_type} SQL tables, with their properties:
      #
      # {schema}
      #
      #
      ### SQL input: {message}

  # SQL 优化
  sql_optimizer:
    name: "sql_optimizer"
    description: "提供优化建议"
    template: |
      ### 请根据以下 table properties 和 SQL input{description}. {ext}
      #
      ### {db_type} SQL tables, with their properties:
      #
      # {schema}
      #
      #
      ### SQL input: {message}

  # SQL 转换
  sql_2_sql:
    name: "sql_2_sql"
    description: "进行SQL转换"
    template: |
      ### 请根据以下 table properties 和 SQL input{description}. {ext}
      #
      ### {db_type} SQL tables, with their properties:
      #
      # {schema}
      #
      #
      ### SQL input: {message}
      #
      ### 目标 SQL 类型：{target_sql_type}

  # 表选择
  select_tables:
    name: "select_tables"
    description: "Select tables for query"
    template: |
      ### Based on the following table properties and SQL input{description}. {ext}
      #
      ### {db_type} SQL tables, with their properties:
      #
      # {schema}
      #
      #
      ### SQL input: {message}
      
      Output only JSON in format: {"table_names":["table1","table2"]}. Do not output any other text.

  # 文本生成
  text_generation:
    name: "text_generation"
    description: "文本生成"
    template: "{message}"

  # 标题生成
  title_generation:
    name: "title_generation"
    description: "生成标题"
    template: |
      请为以下 SQL 查询生成一个简洁的中文标题（不超过 20 字），直接输出标题内容，不要包含任何引号或额外解释：
      
      {message}

  # 自然语言转注释
  nl_2_comment:
    name: "nl_2_comment"
    description: "猜测表和字段注释"
    template: |
      ### 请根据以下 table properties 和 SQL input{description}. {ext}
      #
      ### {db_type} SQL tables, with their properties:
      #
      # {schema}
      #
      ### 任务：为表和字段生成合适的中文注释
      
      请分析以下表和字段的用途，为它们生成准确、简洁的中文注释。
      
      **输出格式要求（严格遵守 JSON 格式）：**
      
      ```json
      {
        "table_comment": "表的注释内容",
        "column_comments": [
          {
            "column_name": "字段名1",
            "comment": "字段1的注释内容"
          },
          {
            "column_name": "字段名2",
            "comment": "字段2的注释内容"
          }
        ]
      }
      ```
      
      **注意事项：**
      1. 只输出 JSON 内容，不要包含其他解释文字
      2. 注释应该简洁明了，不超过 50 字
      3. 注释应该准确反映表/字段的业务含义
      4. 使用中文注释
